<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style_exo.css">
    <title>Exercices</title>
</head>
<body>
    <section>
        <button class="btn btn-zoom">
            Zoom
        </button>
        <button class="btn btn-rotate">
            Rotate
        </button>
        <button class="btn btn-translate">
            Translate
        </button>
        <button class="btn btn-skew">
            Skew
        </button>
        <button class="btn btn-zoom btn-shine">
            <div class="shine">
                <span class="shine-1"></span>
                <span class="shine-2"></span>
            </div>
            Shine
        </button>
        <div class="anim anim-bounce"></div>
        <div class="anim anim-rotate"></div>
        <div class="multiple-rotate anim-rotate">
            <div class="anim anim-rotate-special anim-1">1</div>
            <div class="anim anim-rotate-special anim-2">2</div>
            <div class="anim anim-rotate-special anim-3">3</div>
            <div class="anim anim-rotate-special anim-4">4</div>
            <div class="anim anim-rotate anim-big">big</div>
        </div>
        <div class="anim anim-cubez"></div>
        <div class="anim multiple-hover"></div>
        <button class="btn btn-multi">multi hover focus clic</button>
        <div class="anim anim-scroll"></div>
        <div class="anim anim-scroll"></div>
        <div class="anim anim-scroll"></div>
        <div class="anim anim-scroll"></div>
    </section>

    <script src="exo.js"></script>
</body>
</html>
